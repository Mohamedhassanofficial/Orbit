# ORBIT local stack: MySQL + FastAPI backend (+ optional event indexer).
#   docker compose up --build            # db + api
#   docker compose --profile indexer up  # also run the on-chain indexer
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: orbit
      MYSQL_USER: orbit
      MYSQL_PASSWORD: orbit
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: ./backend
    environment:
      DATABASE_URL: mysql+pymysql://orbit:orbit@db:3306/orbit
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      BSC_RPC_URL: ${BSC_RPC_URL:-https://bsc-dataseed.binance.org}
      CHAIN_ID: ${CHAIN_ID:-56}
      TOKEN_ADDRESS: ${TOKEN_ADDRESS:-}
      STAKING_ADDRESS: ${STAKING_ADDRESS:-}
      REFERRAL_ADDRESS: ${REFERRAL_ADDRESS:-}
      PRESALE_ADDRESS: ${PRESALE_ADDRESS:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # Optional: mirrors on-chain events into MySQL. Needs the contract addresses
  # set (above). Enabled only with `--profile indexer`.
  indexer:
    build: ./backend
    command: python -m app.indexer.indexer
    working_dir: /app
    environment:
      DATABASE_URL: mysql+pymysql://orbit:orbit@db:3306/orbit
      BSC_RPC_URL: ${BSC_RPC_URL:-https://bsc-dataseed.binance.org}
      CHAIN_ID: ${CHAIN_ID:-56}
      TOKEN_ADDRESS: ${TOKEN_ADDRESS:-}
      STAKING_ADDRESS: ${STAKING_ADDRESS:-}
      REFERRAL_ADDRESS: ${REFERRAL_ADDRESS:-}
      PRESALE_ADDRESS: ${PRESALE_ADDRESS:-}
      INDEXER_POLL_SECONDS: ${INDEXER_POLL_SECONDS:-10}
      # Referral payout automation
      DISTRIBUTOR_PRIVATE_KEY: ${DISTRIBUTOR_PRIVATE_KEY:-}
      REFERRAL_DELAY_HOURS: ${REFERRAL_DELAY_HOURS:-30}
      REFERRAL_MAX_HOURS: ${REFERRAL_MAX_HOURS:-72}
      REFERRAL_REWARD_BPS: ${REFERRAL_REWARD_BPS:-1000}
    profiles: ["indexer"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
